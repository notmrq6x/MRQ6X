<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindlop 3D Forge | Working Version</title>
  <style>
    :root {
      --bg: #09090b;
      --text: #fafafa;
      --primary: #8b5cf6;
      --accent: #d946ef;
      --box-bg: #18181b;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 { 
      margin-bottom: 8px; 
      font-size: clamp(1.8rem, 5vw, 2.5rem);
      font-weight: 700;
    }
    
    h1 span { 
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .subtitle { 
      color: #a1a1aa; 
      margin-bottom: 30px; 
      font-size: 14px;
      font-weight: 500;
    }

    #upload-box {
      border: 2px dashed var(--primary);
      border-radius: 15px;
      padding: 50px 30px;
      width: 100%;
      max-width: 400px;
      background: var(--box-bg);
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    #upload-box:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(139, 92, 246, 0.2);
    }

    #upload-box h2 {
      font-size: 1.4rem;
      margin-bottom: 10px;
      color: var(--text);
    }

    #upload-box p {
      color: #71717a;
      font-size: 14px;
    }
    
    #file-input { display: none; }

    #status-area {
      display: none;
      margin-top: 30px;
      width: 100%;
      max-width: 450px;
      background: var(--box-bg);
      padding: 30px;
      border-radius: 15px;
      border: 1px solid #27272a;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .loader {
      border: 5px solid #27272a;
      border-top: 5px solid var(--accent);
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px auto;
    }

    @keyframes spin { 
      0% { transform: rotate(0deg); } 
      100% { transform: rotate(360deg); } 
    }

    #status-text {
      font-size: 1.3rem;
      margin-bottom: 10px;
      color: var(--text);
      font-weight: 600;
    }

    #status-detail {
      color: #a1a1aa;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 0;
    }

    .btn {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      border: none;
      padding: 16px 24px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-top: 20px;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    #preview-container {
      margin-top: 20px;
      display: none;
    }

    #preview-img {
      max-width: 100%;
      max-height: 200px;
      border-radius: 10px;
      border: 2px solid #27272a;
    }

    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 10px;
      padding: 15px;
      margin-top: 15px;
      color: #fca5a5;
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      body { padding: 15px; }
      #upload-box { padding: 40px 20px; }
      #status-area { padding: 25px 20px; }
    }
  </style>
</head>
<body>

  <h1>Mindlop <span>3D Forge</span></h1>
  <p class="subtitle">Convert 2D Images to 3D Models</p>

  <div id="upload-box" onclick="document.getElementById('file-input').click();">
    <h2>📸 Select Image</h2>
    <p>Click to browse your anime/character images</p>
    <input type="file" id="file-input" accept="image/*">
  </div>

  <div id="preview-container">
    <img id="preview-img" alt="Preview">
  </div>

  <div id="status-area">
    <div id="loading-spinner" class="loader"></div>
    <h3 id="status-text">Processing...</h3>
    <p id="status-detail">Please wait while we generate your 3D model.</p>
    <div id="error-container"></div>
    <button id="download-btn" class="btn" style="display: none;" onclick="downloadModel()">⬇️ Download 3D Model</button>
  </div>

  <script>
    let generatedModelUrl = "";
    let generatedModelBlob = null;

    // Convert file to Base64
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
      });
    }

    // Show image preview
    function showPreview(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        document.getElementById('preview-img').src = e.target.result;
        document.getElementById('preview-container').style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    // Show error message
    function showError(message) {
      const errorContainer = document.getElementById('error-container');
      errorContainer.innerHTML = `<div class="error">⚠️ ${message}</div>`;
    }

    // Main processing function
    document.getElementById('file-input').addEventListener('change', async (event) => {
      const file = event.target.files[0];
      if (!file) return;

      // Validate file type
      if (!file.type.startsWith('image/')) {
        alert('Please select a valid image file');
        return;
      }

      // Show preview
      showPreview(file);

      // Hide upload box and show status
      document.getElementById('upload-box').style.display = 'none';
      document.getElementById('status-area').style.display = 'block';
      document.getElementById('loading-spinner').style.display = 'block';
      document.getElementById('download-btn').style.display = 'none';
      document.getElementById('error-container').innerHTML = '';
      
      const statusText = document.getElementById('status-text');
      const statusDetail = document.getElementById('status-detail');

      try {
        // Step 1: Encode image
        statusText.innerText = "📦 Encoding Image...";
        statusDetail.innerText = "Converting your image to processable format...";
        
        const base64Image = await fileToBase64(file);

        // Step 2: Send to API
        statusText.innerText = "🤖 Generating 3D Model...";
        statusDetail.innerText = "AI is analyzing your image and creating a 3D mesh. This may take 30-60 seconds...";

        // Using CORS proxy to bypass restrictions
        const corsProxy = "https://corsproxy.io/?";
        const apiUrl = "https://stabilityai-triposr.hf.space/api/predict";
        
        const response = await fetch(corsProxy + encodeURIComponent(apiUrl), {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            data: [
              base64Image,  // Image data
              true,         // Remove background
              256           // Resolution (higher = better quality but slower)
            ]
          })
        });

        if (!response.ok) {
          throw new Error(`API Error: ${response.status} - ${response.statusText}`);
        }

        const result = await response.json();

        // Step 3: Extract model URL
        if (result.data && result.data[0]) {
          let modelPath = result.data[0].url || result.data[0];
          
          // Handle relative URLs
          if (typeof modelPath === 'string' && modelPath.startsWith('/')) {
            modelPath = "https://stabilityai-triposr.hf.space" + modelPath;
          }
          
          // Fetch the actual model file
          statusText.innerText = "📥 Downloading Model...";
          statusDetail.innerText = "Retrieving your 3D file...";

          const modelResponse = await fetch(corsProxy + encodeURIComponent(modelPath));
          if (!modelResponse.ok) {
            throw new Error("Failed to download 3D model file");
          }

          generatedModelBlob = await modelResponse.blob();
          generatedModelUrl = URL.createObjectURL(generatedModelBlob);
          
          // Success!
          document.getElementById('loading-spinner').style.display = 'none';
          statusText.innerText = "✅ Generation Complete!";
          statusDetail.innerText = "Your 3D model is ready! Click below to download the .GLB file for use in Blender, Unity, or any 3D software.";
          document.getElementById('download-btn').style.display = 'block';
          
        } else {
          throw new Error("API returned unexpected response format");
        }

      } catch (error) {
        console.error("Error:", error);
        document.getElementById('loading-spinner').style.display = 'none';
        statusText.innerText = "❌ Generation Failed";
        statusDetail.innerText = "Something went wrong during processing.";
        
        let errorMsg = error.message;
        
        if (errorMsg.includes('Failed to fetch')) {
          errorMsg = "Network error. Please check your internet connection and try again.";
        } else if (errorMsg.includes('API Error')) {
          errorMsg = "The 3D generation service is temporarily unavailable. Please try again in a few minutes.";
        }
        
        showError(errorMsg);
        
        // Show retry button
        document.getElementById('download-btn').style.display = 'block';
        document.getElementById('download-btn').innerText = '🔄 Try Again';
        document.getElementById('download-btn').onclick = resetApp;
      }
    });

    // Download the generated model
    function downloadModel() {
      if (generatedModelBlob) {
        const link = document.createElement('a');
        link.href = generatedModelUrl;
        link.download = `mindlop_3d_model_${Date.now()}.glb`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        // Reset after 2 seconds
        setTimeout(resetApp, 2000);
      }
    }

    // Reset the app to initial state
    function resetApp() {
      document.getElementById('status-area').style.display = 'none';
      document.getElementById('upload-box').style.display = 'block';
      document.getElementById('preview-container').style.display = 'none';
      document.getElementById('file-input').value = '';
      document.getElementById('download-btn').innerText = '⬇️ Download 3D Model';
      document.getElementById('download-btn').onclick = downloadModel;
      
      // Clean up blob URL
      if (generatedModelUrl) {
        URL.revokeObjectURL(generatedModelUrl);
        generatedModelUrl = "";
        generatedModelBlob = null;
      }
    }
  </script>

</body>
  </html>
